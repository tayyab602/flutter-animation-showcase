name: animation_showcase
description: A Flutter/Dart animation showcase with multiple custom animations and Lottie integration
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  lottie: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/background.json
    - assets/cat.json
    - assets/loading.json
    - assets/sample.json
    - assets/confetti.json
    - assets/galaxy.json
    - assets/wave_anim.json
    - assets/globe.json
    - assets/data_anim.json
    - assets/stars.json
